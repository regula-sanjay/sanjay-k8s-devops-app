apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanjay-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sanjay-app
  template:
    metadata:
      labels:
        app: sanjay-app
    spec:
      containers:
      - name: sanjay-app
        image: sanjay/sanjay-app:latest
        ports:
        - containerPort: 3000
